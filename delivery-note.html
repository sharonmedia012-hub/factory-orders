<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תעודת משלוח - מגוון מערכות שילוט</title>
<style>
  :root{
    --ink:#141414;
    --ink-soft:#4a4a4a;
    --line:#141414;
    --hair:#d8d5cd;
    --paper:#fbfaf7;
    --gold:#b8863b;
    --gold-soft:#f1e6d2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#e9e6df;
    font-family:"Segoe UI","Arial Hebrew","Arial",sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:24px 12px 60px;
  }
  #sheet{
    background:var(--paper);
    width:100%;
    max-width:780px;
    padding:28px 22px 34px;
    box-shadow:0 2px 18px rgba(0,0,0,.12);
    position:relative;
  }
  #sheet::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid var(--hair);
    pointer-events:none;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    border-bottom:3px solid var(--line);
    padding-bottom:14px;
    margin-bottom:16px;
  }
  header img{
    height:56px;
    width:auto;
    display:block;
  }
  .company-info{
    text-align:left;
    font-size:12px;
    line-height:1.6;
    color:var(--ink-soft);
    direction:rtl;
  }
  .company-info [contenteditable]{
    outline:none;
    border-bottom:1px dashed transparent;
  }
  .company-info [contenteditable]:hover,
  .company-info [contenteditable]:focus{
    border-bottom:1px dashed var(--gold);
    background:var(--gold-soft);
  }
  .doc-title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .doc-title{
    font-size:26px;
    font-weight:800;
    letter-spacing:.5px;
  }
  .doc-meta{
    font-size:12px;
    color:var(--ink-soft);
    text-align:left;
  }
  .doc-meta span{color:var(--gold);font-weight:700;}
  .grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-bottom:18px;
  }
  .field{
    border-bottom:1.5px solid var(--line);
    padding-bottom:4px;
  }
  .field label{
    display:block;
    font-size:11px;
    color:var(--gold);
    font-weight:700;
    letter-spacing:.3px;
    margin-bottom:3px;
  }
  .field input,
  .field textarea{
    width:100%;
    border:none;
    background:transparent;
    font-size:14px;
    font-family:inherit;
    color:var(--ink);
    padding:2px 0;
  }
  .field input:focus,.field textarea:focus{outline:none;}
  table.items{
    width:100%;
    border-collapse:collapse;
    margin-bottom:6px;
    font-size:13px;
  }
  table.items thead th{
    background:var(--ink);
    color:var(--paper);
    font-size:11px;
    font-weight:700;
    padding:7px 6px;
    text-align:center;
  }
  table.items tbody td{
    border-bottom:1px solid var(--hair);
    padding:6px;
    text-align:center;
    vertical-align:middle;
  }
  table.items tbody td:nth-child(2){text-align:right;}
  table.items input{
    width:100%;
    border:none;
    background:transparent;
    font-family:inherit;
    font-size:13px;
    text-align:center;
    padding:3px;
  }
  table.items input.desc-input{text-align:right;}
  table.items input:focus{outline:1px solid var(--gold);background:var(--gold-soft);}
  .row-actions{display:flex;gap:6px;justify-content:center;}
  .icon-btn{
    border:1px solid var(--hair);
    background:#fff;
    width:24px;height:24px;
    border-radius:4px;
    cursor:pointer;
    font-size:13px;
    line-height:1;
    color:var(--ink-soft);
  }
  .icon-btn:hover{border-color:var(--gold);color:var(--gold);}
  #addRowBtn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:none;
    border:1.5px dashed var(--gold);
    color:var(--gold);
    font-size:12px;
    font-weight:700;
    padding:6px 12px;
    border-radius:4px;
    cursor:pointer;
    margin-bottom:20px;
  }
  #addRowBtn:hover{background:var(--gold-soft);}
  .totals{
    margin-right:auto;
    width:280px;
    margin-bottom:24px;
  }
  .totals-row{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    padding:5px 0;
    border-bottom:1px solid var(--hair);
  }
  .totals-row.vat-row select{
    border:none;background:transparent;font-family:inherit;font-size:12px;color:var(--ink-soft);
  }
  .totals-row.grand{
    border-bottom:none;
    border-top:2px solid var(--line);
    margin-top:4px;
    padding-top:8px;
    font-size:16px;
    font-weight:800;
  }
  .totals-row.grand span:last-child{color:var(--gold);}
  .attach-section{
    border:1.5px solid var(--hair);
    border-radius:6px;
    padding:14px 16px;
    margin-bottom:22px;
    background:#fff;
  }
  .attach-label{
    display:block;
    font-size:11px;
    color:var(--gold);
    font-weight:700;
    letter-spacing:.3px;
    margin-bottom:10px;
  }
  .attach-buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .attach-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    border:1.5px dashed var(--gold);
    color:var(--gold);
    font-size:12px;
    font-weight:700;
    padding:9px 14px;
    border-radius:5px;
    cursor:pointer;
    background:var(--gold-soft);
  }
  .attach-btn:hover{background:#ecd9b3;}
  #attachPreviewWrap{
    margin-top:14px;
    border-top:1px solid var(--hair);
    padding-top:12px;
  }
  .attach-preview-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
    font-size:12px;
    color:var(--ink-soft);
  }
  #attachPreview img,
  #attachPreview canvas{
    max-width:100%;
    border:1px solid var(--hair);
    border-radius:4px;
    display:block;
  }
  #attachPreview .pdf-note{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .signoff{
    display:grid;
    grid-template-columns:1fr 1.3fr;
    gap:20px;
    margin-bottom:10px;
  }
  .sign-field label{
    display:block;
    font-size:11px;
    color:var(--gold);
    font-weight:700;
    margin-bottom:5px;
  }
  .sign-field input{
    width:100%;
    border:none;
    border-bottom:1.5px solid var(--line);
    font-size:14px;
    font-family:inherit;
    padding:4px 0;
    background:transparent;
  }
  .sign-field input:focus{outline:none;}
  canvas#sigPad{
    width:100%;
    height:110px;
    border:1.5px solid var(--line);
    background:#fff;
    touch-action:none;
    display:block;
    border-radius:3px;
  }
  .sig-tools{
    display:flex;
    justify-content:space-between;
    margin-top:5px;
    font-size:11px;
    color:var(--ink-soft);
  }
  .sig-tools button{
    background:none;border:none;color:var(--gold);font-size:11px;font-weight:700;cursor:pointer;padding:0;
  }
  .actions{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:26px;
  }
  .btn{
    border:none;
    padding:11px 22px;
    font-size:14px;
    font-weight:700;
    border-radius:5px;
    cursor:pointer;
    font-family:inherit;
  }
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-primary:hover{background:#000;}
  .btn-ghost{background:none;border:1.5px solid var(--hair);color:var(--ink-soft);}
  .btn-ghost:hover{border-color:var(--ink);color:var(--ink);}
  footer.legal{
    text-align:center;
    font-size:10px;
    color:#a9a49a;
    margin-top:22px;
    letter-spacing:.2px;
  }
  @media (max-width:600px){
    .grid2{grid-template-columns:1fr;}
    .signoff{grid-template-columns:1fr;}
    header{flex-direction:column;align-items:flex-start;gap:10px;}
    .company-info{text-align:right;}
    .doc-title-row{flex-direction:column;align-items:flex-start;gap:4px;}
    table.items{font-size:12px;}
  }
  @media print{
    body{background:#fff;padding:0;}
    #sheet{box-shadow:none;max-width:100%;padding:14px;}
    #sheet::before{display:none;}
    .actions,#addRowBtn,.row-actions,.sig-tools,.attach-buttons,#removeAttach{display:none !important;}
    table.items input,.field input,.sign-field input{color:#000;}
    .attach-section{border:none;padding:0;page-break-inside:avoid;}
    .attach-label{color:#000;}
  }
/* הסתרת עמודות מחיר */
table.items th:nth-child(4),table.items th:nth-child(5),table.items td:nth-child(4),table.items td:nth-child(5){display:none}
.totals{display:none!important}
</style>
</head>

<script>
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

</script>
<script>
// ---- doc number + date ----
function pad(n){return n.toString().padStart(2,'0');}
const now = new Date();

// ---- קריאת פרמטרים מההזמנה ----
const urlParams = new URLSearchParams(window.location.search);
const pOrderNum = urlParams.get('num')||'';
const pCustomer = urlParams.get('customer')||'';
const pPhone    = urlParams.get('phone')||'';
const pDetails  = urlParams.get('details')||'';
const pQty      = urlParams.get('qty')||'';

document.getElementById('docNum').textContent = pOrderNum ||
  (now.getFullYear().toString().slice(2) + pad(now.getMonth()+1) + pad(now.getDate()) + '-' + pad(now.getHours()) + pad(now.getMinutes()));
document.getElementById('docDate').value = now.toISOString().slice(0,10);
if(pCustomer) document.getElementById('toName').value = pCustomer;
if(pPhone)    document.getElementById('toPhone').value = pPhone;

// ---- items table ----
const itemsBody = document.getElementById('itemsBody');
let rowCount = 0;

function addRow(desc='', qty='', price=''){
  rowCount++;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="rowNum">${rowCount}</td>
    <td><input class="desc-input" type="text" value="${desc}" placeholder="תיאור הפריט"></td>
    <td><input class="qty-input" type="number" min="0" step="1" value="${qty}"></td>
    <td><input class="price-input" type="number" min="0" step="0.01" value="${price}"></td>
    <td class="line-total">0.00</td>
    <td class="row-actions"><button type="button" class="icon-btn removeRow" title="הסר שורה">✕</button></td>
  `;
  itemsBody.appendChild(tr);
  renumber();
  calcTotals();
}

function renumber(){
  [...itemsBody.querySelectorAll('tr')].forEach((tr,i)=>{
    tr.querySelector('.rowNum').textContent = i+1;
  });
}

function calcTotals(){
  let sub = 0;
  itemsBody.querySelectorAll('tr').forEach(tr=>{
    const qty = parseFloat(tr.querySelector('.qty-input').value) || 0;
    const price = parseFloat(tr.querySelector('.price-input').value) || 0;
    const lineTotal = qty * price;
    tr.querySelector('.line-total').textContent = lineTotal.toFixed(2);
    sub += lineTotal;
  });
  const vatRate = parseFloat(document.getElementById('vatRate').value) || 0;
  const vat = sub * (vatRate/100);
  const grand = sub + vat;
  document.getElementById('subTotal').textContent = sub.toFixed(2) + ' ₪';
  document.getElementById('vatAmount').textContent = vat.toFixed(2) + ' ₪';
  document.getElementById('grandTotal').textContent = grand.toFixed(2) + ' ₪';
}

itemsBody.addEventListener('input', calcTotals);
itemsBody.addEventListener('click', (e)=>{
  if(e.target.classList.contains('removeRow')){
    e.target.closest('tr').remove();
    renumber();
    calcTotals();
  }
});
document.getElementById('addRowBtn').addEventListener('click', ()=>addRow());
document.getElementById('vatRate').addEventListener('change', calcTotals);

// start with rows — first row from order if exists
if(pDetails){ addRow(pDetails.replace(/"/g,'&quot;'), pQty||'1'); addRow(); addRow(); }
else { addRow(); addRow(); addRow(); }

// ---- signature pad ----
const canvas = document.getElementById('sigPad');
const ctx = canvas.getContext('2d');
let drawing = false;
let hasSignature = false;

function resizeCanvas(){
  const ratio = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const imgData = hasSignature ? canvas.toDataURL() : null;
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  ctx.scale(ratio, ratio);
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#141414';
  if(imgData){
    const img = new Image();
    img.onload = ()=> ctx.drawImage(img, 0,0, rect.width, rect.height);
    img.src = imgData;
  }
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 50);

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  if(e.touches && e.touches.length){
    return {x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top};
  }
  return {x: e.clientX - rect.left, y: e.clientY - rect.top};
}
function start(e){
  drawing = true; hasSignature = true;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  e.preventDefault();
}
function move(e){
  if(!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  e.preventDefault();
}
function end(){ drawing = false; }

canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', move);
window.addEventListener('mouseup', end);
canvas.addEventListener('touchstart', start, {passive:false});
canvas.addEventListener('touchmove', move, {passive:false});
canvas.addEventListener('touchend', end);

document.getElementById('clearSig').addEventListener('click', ()=>{
  const rect = canvas.getBoundingClientRect();
  ctx.clearRect(0,0,rect.width,rect.height);
  hasSignature = false;
});

// ---- attachment (work drawing: image or PDF) ----
const cameraInput = document.getElementById('cameraInput');
const fileInput = document.getElementById('fileInput');
const attachPreviewWrap = document.getElementById('attachPreviewWrap');
const attachPreview = document.getElementById('attachPreview');
const attachFileName = document.getElementById('attachFileName');
const removeAttachBtn = document.getElementById('removeAttach');

function clearAttachment(){
  attachPreview.innerHTML = '';
  attachFileName.textContent = '';
  attachPreviewWrap.style.display = 'none';
  cameraInput.value = '';
  fileInput.value = '';
}

async function handleAttachedFile(file){
  if(!file) return;
  attachPreview.innerHTML = '';
  attachFileName.textContent = file.name || 'קובץ מצורף';
  attachPreviewWrap.style.display = 'block';

  if(file.type === 'application/pdf'){
    attachPreview.innerHTML = '<div class="pdf-note">טוען תצוגה מקדימה של ה-PDF…</div>';
    try{
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: buf}).promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({scale: 1.5});
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx2 = canvas.getContext('2d');
      await page.render({canvasContext: ctx2, viewport: viewport}).promise;
      attachPreview.innerHTML = '';
      attachPreview.appendChild(canvas);
      const note = document.createElement('div');
      note.className = 'pdf-note';
      note.textContent = pdf.numPages > 1 ? `מוצג עמוד 1 מתוך ${pdf.numPages} (ה-PDF המלא מצורף לתעודה)` : 'עמוד מתוך קובץ ה-PDF שצורף';
      attachPreview.appendChild(note);
    }catch(err){
      attachPreview.innerHTML = '<div class="pdf-note">לא ניתן להציג תצוגה מקדימה של קובץ ה-PDF, אך הוא צורף בהצלחה.</div>';
    }
  } else if(file.type.startsWith('image/')){
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = document.createElement('img');
      img.src = e.target.result;
      img.alt = 'שרטוט עבודה';
      attachPreview.appendChild(img);
    };
    reader.readAsDataURL(file);
  } else {
    attachPreview.innerHTML = '<div class="pdf-note">סוג קובץ לא נתמך. יש להעלות תמונה (JPG/PNG) או PDF.</div>';
  }
}

cameraInput.addEventListener('change', (e)=> handleAttachedFile(e.target.files[0]));
fileInput.addEventListener('change', (e)=> handleAttachedFile(e.target.files[0]));
removeAttachBtn.addEventListener('click', clearAttachment);

// ---- טעינה אוטומטית של קובץ הגרפיקה מההזמנה ----
const pFileUrl  = urlParams.get('file')||'';
const pFileName = urlParams.get('filename')||'קובץ גרפיקה';
if(pFileUrl){
  (async ()=>{
    try{
      attachPreviewWrap.style.display = 'block';
      attachFileName.textContent = pFileName + ' (מההזמנה)';
      attachPreview.innerHTML = '<div class="pdf-note">טוען את קובץ הגרפיקה מההזמנה…</div>';
      const resp = await fetch(pFileUrl);
      const blob = await resp.blob();
      const isPdf = pFileName.toLowerCase().endsWith('.pdf') || blob.type==='application/pdf';
      const file = new File([blob], pFileName, {type: isPdf?'application/pdf':blob.type});
      await handleAttachedFile(file);
      attachFileName.textContent = pFileName + ' (מההזמנה)';
    }catch(err){
      attachPreview.innerHTML = '<div class="pdf-note">לא ניתן לטעון את קובץ הגרפיקה אוטומטית — ניתן לצרף ידנית.</div>';
    }
  })();
}

// ---- actions ----
document.getElementById('printBtn').addEventListener('click', ()=> window.print());
document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(confirm('לפתוח טופס חדש וריק? כל המידע שהוזן יימחק.')){
    document.getElementById('toName').value='';
    document.getElementById('toAddress').value='';
    document.getElementById('recipientName').value='';
    document.getElementById('notes').value='';
    itemsBody.innerHTML='';
    rowCount = 0;
    addRow(); addRow(); addRow();
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0,0,rect.width,rect.height);
    hasSignature = false;
    clearAttachment();
    now.setTime(Date.now());
    document.getElementById('docNum').textContent =
      now.getFullYear().toString().slice(2) + pad(now.getMonth()+1) + pad(now.getDate()) + '-' + pad(now.getHours()) + pad(now.getMinutes());
    document.getElementById('docDate').value = new Date().toISOString().slice(0,10);
  }
});
</script>
