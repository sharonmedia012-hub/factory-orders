<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>מערכת הזמנות · מפעל</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,Arial,sans-serif;background:#F1F5F9;direction:rtl;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit;direction:rtl;font-size:14px}

#app{display:flex;flex-direction:column;min-height:100vh}
#topnav{background:#1E3A5F;height:56px;display:flex;align-items:center;padding:0 24px;justify-content:space-between;flex-shrink:0}
#topnav .brand{display:flex;align-items:center;gap:10px;color:white;font-size:16px;font-weight:700}
#topnav .user-area{display:flex;align-items:center;gap:14px}
#topnav .username{font-size:13px;color:#93C5FD}
#body{display:flex;flex:1}
#sidebar{width:220px;background:white;border-left:1px solid #E2E8F0;padding:14px 0;flex-shrink:0;display:flex;flex-direction:column}
#main{flex:1;padding:24px;overflow:auto}

.nav-btn{display:flex;align-items:center;gap:9px;padding:10px 18px;background:transparent;border:none;width:100%;text-align:right;font-size:14px;color:#374151;font-weight:400;transition:background 0.1s}
.nav-btn:hover{background:#F8FAFC}
.nav-btn.active{background:#EFF6FF;color:#1D4ED8;font-weight:600}
.filter-label{margin:16px 0 5px;padding:0 18px;font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:0.07em;text-transform:uppercase}
.filter-btn{display:flex;align-items:center;justify-content:space-between;padding:7px 18px;background:transparent;border:none;width:100%;text-align:right;font-size:13px;color:#64748B;cursor:pointer}
.filter-btn:hover{background:#F8FAFC}
.filter-btn.active{font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.count-badge{border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700}

.card{background:white;border:1px solid #E2E8F0;border-radius:12px}
.order-row{background:white;border:1px solid #E2E8F0;border-radius:12px;padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:9px;transition:box-shadow 0.15s}
.order-row:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.order-row.urgent{border-color:#FCA5A5}
.order-num-box{background:#F8FAFC;border-radius:8px;padding:6px 10px;text-align:center;min-width:74px;flex-shrink:0}

.badge{border-radius:20px;padding:3px 12px;font-size:12px;font-weight:600;white-space:nowrap;border:1px solid}
.badge-pending         {background:#FFFBEB;color:#92400E;border-color:#FCD34D}
.badge-in_progress     {background:#EFF6FF;color:#1E40AF;border-color:#93C5FD}
.badge-needs_revision  {background:#FEF2F2;color:#991B1B;border-color:#FCA5A5}
.badge-sent_to_client  {background:#FFFBEB;color:#B45309;border-color:#FCD34D}
.badge-ready_for_print {background:#F5F3FF;color:#6B21A8;border-color:#C4B5FD}
.badge-in_print        {background:#ECFEFF;color:#0E7490;border-color:#67E8F9}
.badge-completed       {background:#F0FDF4;color:#166534;border-color:#86EFAC}

.input-field{width:100%;border:1px solid #CBD5E1;border-radius:8px;padding:9px 12px;font-size:14px;color:#1E293B;outline:none}
.input-field:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.field-wrap{margin-bottom:18px}
.field-wrap label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px}

.btn-primary{background:#1E3A5F;color:white;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600}
.btn-primary:hover{background:#1a3254}
.btn-ghost{background:none;border:1px solid #E2E8F0;border-radius:8px;padding:10px 18px;font-size:13px;color:#64748B}
.btn-ghost:hover{background:#F8FAFC}
.btn-status{border-radius:8px;padding:10px 14px;font-weight:600;font-size:13px;border:1px solid;text-align:right;width:100%;margin-bottom:8px;display:flex;align-items:center;gap:6px;cursor:pointer}
.btn-start   {background:#EFF6FF;color:#1E40AF;border-color:#93C5FD}
.btn-done    {background:#F0FDF4;color:#166534;border-color:#86EFAC}
.btn-revision{background:#FEF2F2;color:#991B1B;border-color:#FCA5A5}
.btn-back    {background:#EFF6FF;color:#1E40AF;border-color:#93C5FD}

.upload-zone{border:2px dashed #CBD5E1;border-radius:10px;padding:26px 20px;text-align:center;cursor:pointer;background:#F8FAFC;transition:all 0.2s}
.upload-zone:hover{border-color:#93C5FD;background:#EFF6FF}
.upload-zone.has-file{border-color:#2563EB;background:#EFF6FF}

#login-screen{min-height:100vh;background:linear-gradient(135deg,#0D1B2A 0%,#1B2838 50%,#0D1B2A 100%);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;top:-30%;left:-20%;width:600px;height:600px;background:radial-gradient(ellipse,rgba(37,99,235,0.15) 0%,transparent 70%);pointer-events:none}
#login-screen::after{content:'';position:absolute;bottom:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(ellipse,rgba(14,116,144,0.1) 0%,transparent 70%);pointer-events:none}
.login-card{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:48px 44px;width:100%;max-width:440px;text-align:center;position:relative;z-index:1;box-shadow:0 25px 60px rgba(0,0,0,0.4)}

.history-item{display:flex;gap:12px;margin-bottom:14px}
.history-line{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0}
.history-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.history-connector{width:1px;flex:1;background:#E2E8F0;margin-top:4px}

.pdf-toolbar{padding:12px 18px;border-bottom:1px solid #E2E8F0;display:flex;justify-content:space-between;align-items:center}
.pdf-body{height:490px;background:#F8FAFC;display:flex;align-items:center;justify-content:center}
.pdf-placeholder{text-align:center;color:#94A3B8;padding:20px}
.detail-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
.detail-meta{display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;color:#1E293B}
.page-count{font-size:14px;font-weight:400;color:#94A3B8;margin-right:6px}
.back-btn{background:none;border:none;display:flex;align-items:center;gap:4px;font-size:13px;color:#64748B;cursor:pointer;padding:0}
.section-title{font-size:14px;font-weight:700;color:#1E293B;margin-bottom:14px}
.empty-state{text-align:center;padding:80px 20px;color:#94A3B8}
.tag{display:flex;align-items:center;gap:6px}

/* Command bar */
#cmdbar{background:#F8FAFC;border-bottom:1px solid #E2E8F0;padding:10px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.search-input{border:1px solid #CBD5E1;border-radius:8px;padding:8px 14px;font-size:14px;color:#1E293B;outline:none;background:white;direction:rtl;width:260px}
.search-input:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}

/* ── צ'אט צף ── */
#chat-bubble{position:fixed;left:20px;bottom:20px;z-index:9999}
#chat-btn{width:54px;height:54px;border-radius:50%;background:#1E3A5F;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.3);font-size:24px;position:relative}
#chat-badge{position:absolute;top:-4px;right:-4px;background:#EF4444;color:white;border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;display:none}
#chat-window{position:fixed;left:20px;bottom:84px;width:340px;height:480px;background:white;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.2);display:none;flex-direction:column;overflow:hidden;z-index:9998;border:1px solid #E2E8F0}
#chat-window.open{display:flex}
#chat-header{background:#1E3A5F;color:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#chat-tabs{display:flex;gap:4px;padding:8px;background:#F8FAFC;border-bottom:1px solid #E2E8F0;flex-shrink:0}
.chat-tab{flex:1;padding:6px;border:1px solid #E2E8F0;border-radius:6px;background:white;font-size:12px;font-weight:600;cursor:pointer;text-align:center;color:#64748B}
.chat-tab.active{background:#1E3A5F;color:white;border-color:#1E3A5F}
#chat-users{display:none;flex-direction:column;gap:4px;padding:8px;overflow-y:auto;flex:1}
#chat-users.visible{display:flex}
.chat-user-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #E2E8F0;border-radius:8px;background:white;cursor:pointer;font-size:13px;font-weight:500;color:#1E293B;text-align:right}
.chat-user-btn:hover{background:#F1F5F9}
.chat-user-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
#chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg-row{display:flex;flex-direction:column;max-width:80%}
.msg-row.mine{align-self:flex-start}
.msg-row.theirs{align-self:flex-end}
.msg-bubble{padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word}
.msg-row.mine .msg-bubble{background:#1E3A5F;color:white;border-bottom-right-radius:4px}
.msg-row.theirs .msg-bubble{background:#F1F5F9;color:#1E293B;border-bottom-left-radius:4px}
.msg-meta{font-size:10px;color:#94A3B8;margin-top:3px;padding:0 4px}
.msg-row.mine .msg-meta{text-align:right}
.msg-row.theirs .msg-meta{text-align:left}
#chat-input-row{display:flex;gap:8px;padding:10px;border-top:1px solid #E2E8F0;flex-shrink:0}
#chat-input{flex:1;border:1px solid #CBD5E1;border-radius:8px;padding:8px 12px;font-size:13px;outline:none;direction:rtl;font-family:inherit}
#chat-input:focus{border-color:#1E3A5F}
#chat-send{background:#1E3A5F;color:white;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600}
#chat-back{background:none;border:none;color:rgba(255,255,255,0.8);cursor:pointer;font-size:13px;padding:0}
#chat-title-text{font-size:14px;font-weight:600}
.btn-search{background:#1E3A5F;color:white;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer}
.btn-clear{background:none;border:1px solid #FCA5A5;border-radius:8px;padding:7px 13px;font-size:13px;color:#991B1B;cursor:pointer;font-weight:600}
.search-tag{background:#EFF6FF;color:#1E40AF;border:1px solid #93C5FD;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:600}

/* Notifications */
.notif-board{background:#FFFBEB;border:1px solid #FCD34D;border-radius:12px;padding:16px 18px;margin-bottom:20px}
.notif-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.notif-title{font-size:14px;font-weight:700;color:#92400E;display:flex;align-items:center;gap:8px}
.notif-badge{background:#D97706;color:white;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700}
.notif-item{background:white;border:1px solid #FDE68A;border-radius:8px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.notif-item.read{opacity:0.6}
.notif-dot-new{width:8px;height:8px;border-radius:50%;background:#D97706;flex-shrink:0;margin-top:4px}
.notif-dot-read{width:8px;height:8px;border-radius:50%;background:#CBD5E1;flex-shrink:0;margin-top:4px}
.notif-dismiss{background:none;border:none;color:#94A3B8;cursor:pointer;font-size:16px;padding:2px 6px;line-height:1;flex-shrink:0}
.btn-mark-read{background:none;border:1px solid #FCD34D;border-radius:6px;padding:4px 10px;font-size:12px;color:#92400E;cursor:pointer;font-weight:600}

/* Loading overlay */
#loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;font-size:16px;color:#1E3A5F;gap:16px}
.spinner{width:40px;height:40px;border:3px solid #E2E8F0;border-top-color:#1E3A5F;border-radius:50%;animation:spin 0.8s linear infinite}

/* Real-time toast */
#toast{position:fixed;bottom:24px;left:24px;background:#1E3A5F;color:white;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.2);transform:translateY(80px);opacity:0;transition:all 0.3s;z-index:1000;max-width:320px}
#toast.show{transform:translateY(0);opacity:1}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading-overlay">
  <div class="spinner"></div>
  <div>טוען מערכת...</div>
</div>
<div id="toast"></div>
<div id="app"></div>

// ─── DB: הזמנות ───────────────────────────────────────────────────
async function dbLoadOrders(){
  const {data,error} = await db.from('orders').select('*').order('id',{ascending:false});
  if(error){ console.error('loadOrders:',error); return []; }
  return (data||[]).map(o=>({
    id:o.id, num:o.num, customer:o.customer, due:o.due,
    notes:o.notes||'', details:o.details||'', quantity:o.quantity||'',
    status:o.status,
    byName: o.byname||o.byName||'',
    byId:   o.byid||o.byId||'',
    createdAt: o.createdat||o.createdAt||'',
    fileName:  o.filename||o.fileName||null,
    fileSize:  o.filesize||o.fileSize||null,
    fileUrl:   o.fileurl||o.fileUrl||null,
    hasGraphics: o.hasgraphics!==undefined ? o.hasgraphics : (o.hasGraphics!==undefined ? o.hasGraphics : null),
    installdue: o.installdue||null,
    history: typeof o.history==='string' ? JSON.parse(o.history) : (o.history||[])
  }));
}

async function dbInsertOrder(order){
  const row = {
    id:order.id, num:order.num, customer:order.customer,
    due:order.due, notes:order.notes||'', details:order.details||'', quantity:order.quantity||'',
    status:order.status,
    byname:order.byName, byid:order.byId,
    createdat:order.createdAt,
    filename:order.fileName||null, filesize:order.fileSize||null, fileurl:order.fileUrl||null,
    hasgraphics:order.hasGraphics,
    installdue:order.installdue||null,
    history:order.history
  };
  const {error} = await db.from('orders').insert(row);
  if(error) console.error('insertOrder:',error);
}

async function dbUpdateOrder(id, patch){
  const row = {};
  if(patch.status    !== undefined) row.status    = patch.status;
  if(patch.history   !== undefined) row.history   = patch.history;
  if(patch.fileName  !== undefined) row.filename  = patch.fileName;
  if(patch.fileSize  !== undefined) row.filesize  = patch.fileSize;
  if(patch.fileUrl   !== undefined) row.fileurl   = patch.fileUrl;
  if(patch.hasGraphics !== undefined) row.hasgraphics = patch.hasGraphics;
  const {error} = await db.from('orders').update(row).eq('id',id);
  if(error) console.error('updateOrder:',error);
}

// ─── DB: קבצים ────────────────────────────────────────────────────
async function dbUploadFile(orderId, file){
  const ext = file.name.split('.').pop().toLowerCase();
  const path = `${orderId}.${ext}`;
  const {error} = await db.storage.from('order-files').upload(path, file, {upsert:true, contentType:file.type});
  if(error){ console.error(error); return null; }
  const {data} = db.storage.from('order-files').getPublicUrl(path);
  return data.publicUrl;
}

function dbGetFileUrl(orderId, fileName){
  if(!fileName||!orderId) return null;
  const ext = fileName.split('.').pop().toLowerCase();
  const {data} = db.storage.from('order-files').getPublicUrl(`${orderId}.${ext}`);
  return data?.publicUrl || null;
}

// ─── DB: התראות ───────────────────────────────────────────────────
async function dbLoadNotifications(){
  const {data,error} = await db.from('notifications').select('*').order('at',{ascending:false});
  if(error){ console.error('loadNotifs:',error); return []; }
  return (data||[]).map(n=>({
    id:n.id, orderId:n.orderid||n.orderId, orderNum:n.ordernum||n.orderNum,
    customer:n.customer, note:n.note||'', at:n.at, read:n.read, source:n.source||'print'
  }));
}

async function dbAddNotification(order, note, source){
  const {error} = await db.from('notifications').insert({
    id:'n_'+Date.now(), orderid:order.id, ordernum:order.num,
    customer:order.customer, note:note||'', at:new Date().toISOString(), read:false,
    source: source||'print'
  });
  if(error) console.error('addNotif:',error);
}

async function dbMarkAllRead(){
  await db.from('notifications').update({read:true}).eq('read',false);
  state.notifications = await dbLoadNotifications();
  render();
}

async function dbDismissNotif(id){
  await db.from('notifications').delete().eq('id',id);
  state.notifications = state.notifications.filter(n=>n.id!==id);
  render();
}

async function dbClearAllNotifs(){
  await db.from('notifications').delete().neq('id','__none__');
  state.notifications = [];
  render();
}

// ─── אתחול ────────────────────────────────────────────────────────
async function init(){
  if(SUPABASE_URL==='YOUR_SUPABASE_URL'){
    document.getElementById('loading-overlay').innerHTML =
      '<div style="text-align:center;padding:40px;max-width:400px"><div style="font-size:48px;margin-bottom:16px">⚙️</div><h2 style="color:#1E3A5F;margin-bottom:12px">נדרשת הגדרה</h2><p style="color:#64748B;line-height:1.6">פתח את הקובץ בעורך טקסט<br>והחלף את SUPABASE_URL ו-SUPABASE_KEY<br>בערכים מפרויקט Supabase שלך</p></div>';
    return;
  }
  try{
    [state.orders, state.notifications] = await Promise.all([dbLoadOrders(), dbLoadNotifications()]);
    if(state.orders.length){
      const max = Math.max(...state.orders.map(o=>parseInt((o.num||'HZ-1000').split('-')[1])||1000));
      if(max>=_counter) _counter=max;
    }
  }catch(e){ console.error(e); }
  document.getElementById('loading-overlay').style.display='none';
  render();
  setupRealtime();
}

// ─── Real-time: התראות חיות ────────────────────────────────────────
function setupRealtime(){
  // Supabase Realtime subscription
  try {
    db.channel('factory-realtime')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications'},async payload=>{
        state.notifications = await dbLoadNotifications();
        if(state.user?.role==='clerk'){
          showToast(`${payload.new.source==='production'?'🏭 הזמנה '+( payload.new.ordernum||payload.new.orderNum)+' מוכנה להתקנה':'✅ הזמנה '+(payload.new.ordernum||payload.new.orderNum)+' הושלמה בדפוס'} — ${payload.new.customer}`);
          render();
        }
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'orders'},async ()=>{
        state.orders = await dbLoadOrders();
        render();
      })
      .subscribe();
  } catch(e){ console.log('Realtime not available, using polling'); }

  // Polling כגיבוי — בדיקה כל 30 שניות
  setInterval(async ()=>{
    if(!state.user) return;
    const prevNotifCount = state.notifications.length;
    const prevUnread = state.notifications.filter(n=>!n.read).length;
    state.notifications = await dbLoadNotifications();
    state.orders = await dbLoadOrders();
    const newUnread = state.notifications.filter(n=>!n.read).length;
    // אם יש התראות חדשות שלא היו לפני
    if(newUnread > prevUnread && state.user.role==='clerk'){
      const newest = state.notifications.find(n=>!n.read);
      if(newest) showToast(`${newest.source==='production'?'🏭 הזמנה '+(newest.orderNum||newest.ordernum)+' מוכנה להתקנה':'✅ הזמנה '+(newest.orderNum||newest.ordernum)+' הושלמה בדפוס'} — ${newest.customer}`);
    }
    render();
  }, 30000);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4000);
}

// ─── Actions: יצירת הזמנה ─────────────────────────────────────────
async function doCreateOrder(){
  const {customer,due,notes,details,quantity,file,hasGraphics,installdue} = state.form;
  const user = state.user;
  if(!customer){ state.formError="יש למלא שם לקוח"; render(); return; }
  if(!due)     { state.formError="יש לבחור תאריך יעד"; render(); return; }
  state.formError="";

  const id  = 'o_'+Date.now();
  const num = 'HZ-'+(++_counter);
  let fileUrl = null;

  showLoadingOverlay('שולח הזמנה...');
  if(file){ fileUrl = await dbUploadFile(id,file); }

  const order = {
    id, num, customer, due, notes:notes||'', details:details||'', quantity:quantity||'',
    status:'pending', byId:user.id, byName:user.name,
    createdAt:new Date().toISOString(),
    fileName:file?file.name:null, fileSize:file?file.size:null, fileUrl,
    hasGraphics: hasGraphics, installdue: installdue||null,
    history:[{status:'pending',note:'הזמנה נוצרה',by:user.name,at:new Date().toISOString()}]
  };

  await dbInsertOrder(order);
  state.orders = await dbLoadOrders();
  state.form   = {customer:'',due:today(),notes:'',details:'',quantity:'',file:null,hasGraphics:null,installdue:''};
  state.view   = 'list';
  hideLoadingOverlay();
  render();
}

// ─── Actions: עדכון סטטוס ─────────────────────────────────────────
async function doUpdateStatus(orderId, newStatus){
  const order = state.orders.find(o=>o.id===orderId);
  if(!order) return;
  const newHistory = [...(order.history||[]),{status:newStatus,note:state.statusNote,by:state.user.name,at:new Date().toISOString()}];
  await dbUpdateOrder(orderId,{status:newStatus,history:newHistory});
  if(newStatus==='completed' && state.user.role==='print'){
    await dbAddNotification(order, state.statusNote, 'print');
  }
  if(newStatus==='ready_for_install' && state.user.role==='production'){
    await dbAddNotification(order, state.statusNote, 'production');
  }
  state.orders = await dbLoadOrders();
  setState({pendingStatus:null, statusNote:""});
}

// ─── Actions: החלפת קובץ ──────────────────────────────────────────
async function doReplaceFile(orderId, file){
  if(!file) return;
  showLoadingOverlay('מעלה קובץ...');
  const fileUrl = await dbUploadFile(orderId, file);
  await dbUpdateOrder(orderId,{fileName:file.name, fileSize:file.size, fileUrl});
  state.orders = await dbLoadOrders();
  hideLoadingOverlay();
  setState({pdfSrc:fileUrl});
}

function doSearch(){
  const q=(state.searchQuery||'').trim();
  if(!q){ setState({searchResults:null}); return; }
  const r=state.orders.filter(o=>o.customer.includes(q)).slice().sort((a,b)=>new Date(a.due)-new Date(b.due));
  setState({searchResults:r,view:'list',selId:null,filter:'all'});
}
function doClearSearch()       { setState({searchQuery:'',searchResults:null}); }

function doOpenDetail(id){
  const order = state.orders.find(o=>o.id===id);
  const src   = order?.fileUrl || null;
  setState({selId:id,view:'detail',pdfSrc:src,pdfLoading:false,pendingStatus:null,statusNote:''});
}

// ─── Helpers ──────────────────────────────────────────────────────
function fmtDate(iso)  { return iso?new Date(iso).toLocaleDateString('he-IL'):''; }
function fmtDateTime(iso){ return iso?new Date(iso).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):''; }
function isPast(due){
  if(!due) return false;
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(due); d.setHours(0,0,0,0);
  return d<t;
}
function getFiltered(){
  const role=state.user?.role||'clerk';
  const active={
    clerk:      ['pending','in_progress','needs_revision','sent_to_client','ready_for_print','in_print','pending_production','in_production','ready_for_install'],
    graphics:   ['pending','in_progress','needs_revision','sent_to_client','ready_for_print','in_print','pending_production','in_production','ready_for_install'],
    print:      ['ready_for_print','in_print','pending_production'],
    production: ['pending_production','in_production','ready_for_install'],
  }[role]||[];
  if(state.filter==='completed') return state.orders.filter(o=>o.status==='completed');
  if(state.filter==='all')       return state.orders.filter(o=>active.includes(o.status));
  return state.orders.filter(o=>o.status===state.filter);
}
function getCounts(){ return state.orders.reduce((a,o)=>({...a,[o.status]:(a[o.status]||0)+1}),{}); }

  if(!state.user){ app.innerHTML=renderLogin(); document.getElementById('inp-u')?.focus(); return; }
  let main='';
  if(state.selId && state.view==='detail') main=renderDetail();
  else if(state.view==='new' && state.user.role==='clerk') main=renderNewOrder();
  else main=renderList();
  app.innerHTML=`${renderNav()}${renderCmdBar()}<div id="body">${renderSidebar()}<main id="main">${main}</main></div>`;
}

function renderSidebar(){
  const counts=getCounts();
  const isListActive=!state.selId&&state.view==='list';
  const isNewActive =!state.selId&&state.view==='new';
  const role=state.user.role;
  return `<aside id="sidebar">
    <button class="nav-btn ${isListActive?'active':''}" onclick="doNav('list')">${icon('list')} כל ההזמנות</button>
    ${role==='clerk'?`<button class="nav-btn ${isNewActive?'active':''}" onclick="doNav('new')">${icon('plus')} הזמנה חדשה</button>`:''}
    <div class="filter-label">סינון</div>
    <button class="filter-btn ${state.filter==='all'?'active':''}" onclick="doSetFilter('all')"><span>הכל</span></button>
    ${Object.entries(STATUS).filter(([k])=>{
      if(role==='print') return ['ready_for_print','in_print','pending_production','completed'].includes(k);
      if(role==='production') return ['pending_production','in_production','ready_for_install','completed'].includes(k);
      return true;
    }).map(([k,v])=>`
      <button class="filter-btn ${state.filter===k?'active':''}" onclick="doSetFilter('${k}')" style="${state.filter===k?'color:'+v.fg:''}">
        <span class="tag"><span class="dot" style="background:${v.dot}"></span>${v.label}</span>
        ${counts[k]>0?`<span class="count-badge" style="background:${k==='in_progress'?'#EFF6FF':k==='needs_revision'?'#FEF2F2':k==='ready_for_print'?'#F5F3FF':k==='in_print'?'#ECFEFF':k==='completed'?'#F0FDF4':k==='sent_to_client'?'#FFFBEB':'#FFFBEB'};color:${v.fg}">${counts[k]}</span>`:''}
      </button>`).join('')}
  </aside>`;
}

// ── Notification Board ─────────────────────────────────────────────
function renderOvertimeBoard(){
  const overdue = state.orders.filter(o=>{
    if(o.status==='completed') return false;
    // בדוק אם תאריך ההזמנה או תאריך ההתקנה חלפו
    const dueOver     = o.due      && isPast(o.due);
    const installOver = o.installdue && isPast(o.installdue);
    return dueOver || installOver;
  });
  if(!overdue.length) return '';
  return `
  <div style="background:#FEF2F2;border:1px solid #FCA5A5;border-radius:12px;padding:16px 18px;margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:14px;font-weight:700;color:#991B1B;display:flex;align-items:center;gap:8px">
        ⚠ הודעות על עבודה בחריגת זמן
        <span style="background:#DC2626;color:white;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700">${overdue.length}</span>
      </div>
    </div>
    ${overdue.map(order=>{
      const dueOver     = order.due      && isPast(order.due);
      const installOver = order.installdue && isPast(order.installdue);
      return `
      <div onclick="doOpenDetail('${order.id}')" style="background:white;border:1px solid #FCA5A5;border-radius:8px;padding:11px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px"
        onmouseover="this.style.background='#FFF5F5'" onmouseout="this.style.background='white'">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:#1E293B;margin-bottom:4px">
            ${order.num} — ${order.customer}
          </div>
          <div style="display:flex;gap:14px;font-size:12px;flex-wrap:wrap">
            ${dueOver?`<span style="color:#DC2626;font-weight:600">📅 תאריך הזמנה: ${fmtDate(order.due)} — באיחור</span>`:''}
            ${installOver?`<span style="color:#DC2626;font-weight:600">🔧 יעד התקנה: ${fmtDate(order.installdue)} — באיחור</span>`:''}
          </div>
        </div>
        <div>
          <span style="background:${STATUS[order.status]?.dot||'#94A3B8'};color:white;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600">${STATUS[order.status]?.label||order.status}</span>
        </div>
        <span style="color:#CBD5E1;font-size:16px">›</span>
      </div>`;
    }).join('')}
  </div>`;
}

function renderNotifBoard(){
  const notifs=state.notifications;
  if(!notifs.length) return '';
  const unread=notifs.filter(n=>!n.read).length;
  return `<div class="notif-board">
    <div class="notif-header">
      <div class="notif-title">🔔 הודעות ${unread>0?`<span class="notif-badge">${unread} חדש</span>`:''}</div>
      <div style="display:flex;gap:8px">
        ${unread>0?`<button class="btn-mark-read" onclick="dbMarkAllRead()">סמן הכל כנקרא</button>`:''}
        <button class="btn-mark-read" style="color:#991B1B;border-color:#FCA5A5" onclick="dbClearAllNotifs()">נקה הכל</button>
      </div>
    </div>
    ${notifs.map(n=>`
      <div class="notif-item ${n.read?'read':''}">
        <div class="${n.read?'notif-dot-read':'notif-dot-new'}"></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:#1E293B">${n.source==='production'?'🏭 הזמנה '+n.orderNum+' מוכנה להתקנה':'✅ הזמנה '+n.orderNum+' הושלמה בדפוס'} <span style="color:#166534">— ${n.customer}</span></div>
          ${n.note?`<div style="font-size:12px;color:#475569;margin-top:4px;background:#F0FDF4;padding:3px 8px;border-radius:4px;border-right:3px solid #86EFAC">💬 ${n.note}</div>`:''}
          <div style="font-size:11px;color:#94A3B8;margin-top:4px">${fmtDateTime(n.at)} · ${n.source==='production'?'מנהל ייצור':'עופר'}</div>
        </div>
        <button class="notif-dismiss" onclick="dbDismissNotif('${n.id}')">✕</button>
      </div>`).join('')}
  </div>`;
}

// ── List ───────────────────────────────────────────────────────────
function renderList(){
  const {searchResults,filter,user} = state;
  const isSearch=searchResults!==null;
  const filtered=isSearch?searchResults:getFiltered();
  const title=isSearch?`תוצאות: "${state.searchQuery}"`:(filter==='all'?'כל ההזמנות':STATUS[filter]?.label);
  return `<div>
    ${user.role==='clerk'?renderOvertimeBoard():''}
    ${user.role==='clerk'?renderNotifBoard():''}
    <div class="page-header">
      <h2 class="page-title">${title}<span class="page-count">(${filtered.length})</span></h2>
      ${user.role==='clerk'?`<button class="btn-primary" onclick="doNav('new')" style="display:flex;align-items:center;gap:6px">${icon('plus','color:white')} הזמנה חדשה</button>`:''}
    </div>
    ${filtered.length===0?`<div class="empty-state">${icon('inbox','color:#94A3B8')}<div style="font-size:16px;font-weight:600;color:#64748B;margin-top:12px">אין הזמנות</div></div>`
    :filtered.map(order=>{
      const urgent=isPast(order.due)&&!['completed','sent_to_client'].includes(order.status);
      const lastNote=order.history&&[...order.history].reverse().find(h=>h.status===order.status&&h.note);
      return `<div class="order-row ${urgent?'urgent':''}" onclick="doOpenDetail('${order.id}')">
        <div class="order-num-box">
          <div style="font-size:10px;color:#94A3B8;font-weight:600;margin-bottom:2px">מספר</div>
          <div style="font-size:13px;font-weight:700;color:#1E293B;font-family:monospace">${order.num}</div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:15px;color:#1E293B;margin-bottom:5px">${order.customer}</div>
          <div style="font-size:12px;color:#94A3B8;display:flex;gap:14px;flex-wrap:wrap">
            <span style="display:flex;align-items:center;gap:4px">${icon('file')} ${order.fileName||'ללא קובץ'}</span>
            <span style="display:flex;align-items:center;gap:4px">${icon('user')} ${order.byName}</span>
            <span style="display:flex;align-items:center;gap:4px">${icon('calendar')} ${fmtDate(order.createdAt)}</span>
          </div>
          ${lastNote?`<div style="font-size:12px;color:#475569;margin-top:5px;background:#F8FAFC;border-right:3px solid #CBD5E1;padding:3px 8px;border-radius:0 4px 4px 0">${lastNote.note}</div>`:''}
        </div>
        <div style="text-align:center;flex-shrink:0">
          <div style="font-size:10px;color:#94A3B8;font-weight:600;margin-bottom:2px">יעד</div>
          <div style="font-size:13px;font-weight:600;color:${urgent?'#991B1B':'#334155'}">${fmtDate(order.due)}</div>
          ${urgent?'<div style="font-size:10px;color:#991B1B;font-weight:600">⚠ באיחור</div>':''}
        </div>
        ${badge(order.status)}
        ${icon('chevron','color:#CBD5E1')}
      </div>`;
    }).join('')}
  </div>`;
}

// ── New Order ──────────────────────────────────────────────────────
function renderNewOrder(){
  const {form,formError}=state;
  return `<div style="max-width:560px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px">
      <button class="back-btn" onclick="doGoBack()">${icon('arrow_r')} חזרה</button>
      <h2 class="page-title">הזמנה חדשה</h2>
    </div>
    <div class="card" style="padding:28px">
      <div class="field-wrap"><label>שם לקוח *</label><input class="input-field" value="${form.customer||''}" placeholder="הכנס שם לקוח" oninput="state.form.customer=this.value"/></div>
      <div class="field-wrap"><label>פירוט הזמנה</label><textarea class="input-field" rows="4" placeholder="סוג עבודה, מידות, צבעים, דגשים..." style="resize:vertical" oninput="state.form.details=this.value">${form.details||''}</textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px">
        <div><label style="display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px">תאריך ההזמנה *</label><input type="date" class="input-field" value="${form.due||today()}" onchange="state.form.due=this.value"/></div>
        <div><label style="display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px">כמות</label><input type="number" min="1" class="input-field" value="${form.quantity||''}" placeholder="כמות" oninput="state.form.quantity=this.value" style="text-align:right"/></div>
      </div>
      <div class="field-wrap">
        <label>תאריך אספקה</label>
        <input type="date" class="input-field" value="${form.installdue||''}" onchange="state.form.installdue=this.value"/>
      </div>
      <div class="field-wrap"><label>הערות נוספות</label><textarea class="input-field" rows="2" placeholder="הערות כלליות..." style="resize:vertical" oninput="state.form.notes=this.value">${form.notes||''}</textarea></div>
      <div class="field-wrap">
        <label>קיימת גרפיקה</label>
        <div style="display:flex;gap:10px;margin-top:2px">
          <button onclick="state.form.hasGraphics=true;render()" style="flex:1;padding:10px;border-radius:8px;border:2px solid ${form.hasGraphics===true?'#166534':'#E2E8F0'};background:${form.hasGraphics===true?'#F0FDF4':'white'};color:${form.hasGraphics===true?'#166534':'#64748B'};font-size:14px;font-weight:${form.hasGraphics===true?'700':'400'};cursor:pointer">
            ✓ כן
          </button>
          <button onclick="state.form.hasGraphics=false;render()" style="flex:1;padding:10px;border-radius:8px;border:2px solid ${form.hasGraphics===false?'#991B1B':'#E2E8F0'};background:${form.hasGraphics===false?'#FEF2F2':'white'};color:${form.hasGraphics===false?'#991B1B':'#64748B'};font-size:14px;font-weight:${form.hasGraphics===false?'700':'400'};cursor:pointer">
            ✗ לא
          </button>
        </div>
      </div>
      <div class="field-wrap">
        <label>קובץ מצורף <span style="font-weight:400;color:#94A3B8">(אופציונלי — PDF או JPG)</span></label>
        <div class="upload-zone ${form.file?'has-file':''}" onclick="document.getElementById('file-inp').click()">
          ${form.file?`${icon('check','color:#2563EB')}<div style="font-weight:600;color:#1E40AF;font-size:14px;margin-top:4px">${form.file.name}</div><div style="font-size:12px;color:#3B82F6;margin-top:4px">${(form.file.size/1024).toFixed(0)} KB · לחץ להחלפה</div>`:
          `<div style="color:#94A3B8">${icon('upload')}</div><div style="font-weight:600;color:#475569;font-size:14px;margin-top:4px">לחץ להעלאת קובץ</div><div style="font-size:12px;color:#94A3B8;margin-top:4px">PDF או JPG</div>`}
          <input id="file-inp" type="file" accept=".pdf,.jpg,.jpeg" style="display:none" onchange="state.form.file=this.files[0];render()"/>
        </div>
      </div>
      ${formError?`<div style="background:#FEF2F2;border:1px solid #FCA5A5;border-radius:8px;padding:9px 14px;margin-bottom:12px;font-size:13px;color:#991B1B;font-weight:600">⚠ ${formError}</div>`:''}
      <div style="display:flex;gap:12px">
        <button class="btn-primary" style="flex:1;padding:12px;font-size:15px" onclick="doCreateOrder()">✓ שלח לגרפיקה</button>
        <button class="btn-ghost" onclick="doGoBack()">ביטול</button>
      </div>
    </div>
  </div>`;
}

// ── Detail ─────────────────────────────────────────────────────────
function renderDetail(){
  const order=state.orders.find(o=>o.id===state.selId);
  if(!order) return '<div>לא נמצאה הזמנה</div>';
  const {pdfSrc,pdfLoading,pendingStatus,statusNote,user}=state;
  const urgent=isPast(order.due)&&!['completed','sent_to_client'].includes(order.status);

  // Status actions
  let statusActions='';
  const notDone=order.status!=='completed';
  const bgMap={completed:'#F0FDF4',needs_revision:'#FEF2F2',ready_for_print:'#F5F3FF',in_print:'#ECFEFF',in_progress:'#EFF6FF',sent_to_client:'#FFFBEB',pending_production:'#EDE9FE',in_production:'#FFF7ED',ready_for_install:'#EFF6FF'};

  if(notDone&&!pendingStatus){
    let btns='';
    if(user.role==='graphics'){
      if(order.status==='pending')
        btns=`<button class="btn-status btn-start" onclick="setState({pendingStatus:'in_progress'})">${icon('play','color:#1E40AF')} התחל טיפול</button>`;
      if(order.status==='in_progress')
        btns=`
          <button class="btn-status" style="background:#FFFBEB;color:#B45309;border:1px solid #FCD34D" onclick="setState({pendingStatus:'sent_to_client'})">${icon('checkmark','color:#B45309')} שלח ללקוח לאישור</button>
          <button class="btn-status" style="background:#F5F3FF;color:#6B21A8;border:1px solid #C4B5FD" onclick="setState({pendingStatus:'ready_for_print'})">${icon('checkmark','color:#6B21A8')} שלח לדפוס</button>
          <button class="btn-status btn-done" onclick="setState({pendingStatus:'completed'})">${icon('checkmark','color:#166534')} סיים ללא דפוס</button>
          <button class="btn-status btn-revision" onclick="setState({pendingStatus:'needs_revision'})">${icon('refresh','color:#991B1B')} דרוש תיקון</button>`;
      if(order.status==='sent_to_client')
        btns=`
          <button class="btn-status" style="background:#F5F3FF;color:#6B21A8;border:1px solid #C4B5FD" onclick="setState({pendingStatus:'ready_for_print'})">${icon('checkmark','color:#6B21A8')} הלקוח אישר — שלח לדפוס</button>
          <button class="btn-status btn-back" onclick="setState({pendingStatus:'in_progress'})">${icon('backtrack','color:#1E40AF')} חזור לעריכה</button>`;
      if(order.status==='needs_revision')
        btns=`<button class="btn-status btn-back" onclick="setState({pendingStatus:'in_progress'})">${icon('backtrack','color:#1E40AF')} חזור לטיפול</button>`;
    }
    if(user.role==='print'){
      if(order.status==='ready_for_print')
        btns=`<button class="btn-status" style="background:#ECFEFF;color:#0E7490;border:1px solid #67E8F9" onclick="setState({pendingStatus:'in_print'})">${icon('play','color:#0E7490')} קבל עבודה להדפסה</button>`;
      if(order.status==='in_print')
        btns=`
          <button class="btn-status btn-done" onclick="setState({pendingStatus:'completed'})">${icon('checkmark','color:#166534')} הדפוס הושלם</button>
          <button class="btn-status" style="background:#EDE9FE;color:#7C3AED;border:1px solid #C4B5FD" onclick="setState({pendingStatus:'pending_production'})">${icon('play','color:#7C3AED')} שלח לייצור</button>
          <button class="btn-status btn-revision" onclick="setState({pendingStatus:'needs_revision'})">${icon('refresh','color:#991B1B')} החזר לגרפיקה</button>`;
    }
    if(user.role==='production'){
      if(order.status==='pending_production')
        btns=`<button class="btn-status" style="background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA" onclick="setState({pendingStatus:'in_production'})">${icon('play','color:#C2410C')} התחל עבודת ייצור</button>`;
      if(order.status==='in_production')
        btns=`
          <button class="btn-status" style="background:#EFF6FF;color:#1D4ED8;border:1px solid #93C5FD" onclick="setState({pendingStatus:'ready_for_install'})">${icon('checkmark','color:#1D4ED8"')} מוכן להתקנה</button>
          <button class="btn-status btn-revision" onclick="setState({pendingStatus:'ready_for_print'})">${icon('refresh','color:#991B1B')} החזר לדפוס — פגם</button>`;
    }
    if(btns) statusActions=`<div class="card" style="padding:18px 20px;margin-bottom:14px"><div class="section-title">${user.role==='print'?'פעולות דפוס':user.role==='production'?'פעולות ייצור':'עדכון סטטוס'}</div>${btns}</div>`;
  } else if(notDone&&pendingStatus){
    const ps=STATUS[pendingStatus];
    const isToProduction = pendingStatus==='pending_production';
    statusActions=`<div class="card" style="padding:18px 20px;margin-bottom:14px">
      <div class="section-title">${user.role==='print'?'פעולות דפוס':user.role==='production'?'פעולות ייצור':'עדכון סטטוס'}</div>
      <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:${bgMap[pendingStatus]||'#EFF6FF'};border-radius:8px;margin-bottom:12px;font-size:13px;font-weight:600;color:${ps.fg}">← ${ps.label}</div>
      <textarea class="input-field" rows="2" placeholder="${isToProduction?'כתוב הערה...':'הוסף הערה (אופציונלי)...'}" style="resize:none;margin-bottom:10px" oninput="state.statusNote=this.value">${statusNote}</textarea>
      <div style="display:flex;gap:9px">
        <button class="btn-primary" style="flex:1;padding:9px" onclick="doUpdateStatus('${order.id}','${pendingStatus}')">אשר</button>
        <button class="btn-ghost" onclick="setState({pendingStatus:null,statusNote:''})">ביטול</button>
      </div>
    </div>`;
  }

  // Status info boxes
  const infoBox=
    order.status==='completed' ? `<div class="card" style="padding:20px;text-align:center;margin-bottom:14px;background:#F0FDF4;border-color:#86EFAC">${icon('circlecheck','margin-bottom:8px;display:block')}<div style="font-weight:700;color:#14532D;font-size:15px">הזמנה הושלמה!</div></div>` :
    order.status==='sent_to_client'&&user.role==='clerk' ? `<div class="card" style="padding:16px 18px;margin-bottom:14px;background:#FFFBEB;border-color:#FCD34D"><div style="font-weight:700;color:#B45309;font-size:14px;margin-bottom:4px">📤 נשלח ללקוח לאישור</div><div style="font-size:12px;color:#D97706">הגרפיקאי שלח את העבודה ללקוח ומחכה לאישור</div></div>` :
    order.status==='ready_for_print'&&user.role!=='print' ? `<div class="card" style="padding:16px 18px;margin-bottom:14px;background:#F5F3FF;border-color:#C4B5FD"><div style="font-weight:700;color:#6B21A8;font-size:14px;margin-bottom:4px">⏳ ממתין לדפוס</div><div style="font-size:12px;color:#7C3AED">ההזמנה הועברה לעופר במחלקת הדפוס</div></div>` :
    order.status==='in_print'&&user.role!=='print' ? `<div class="card" style="padding:16px 18px;margin-bottom:14px;background:#ECFEFF;border-color:#67E8F9"><div style="font-weight:700;color:#0E7490;font-size:14px;margin-bottom:4px">🖨 בתהליך דפוס</div><div style="font-size:12px;color:#0891B2">עופר מטפל בהזמנה כרגע</div></div>` :
    order.status==='pending_production'&&user.role!=='production' ? `<div class="card" style="padding:16px 18px;margin-bottom:14px;background:#EDE9FE;border-color:#C4B5FD"><div style="font-weight:700;color:#7C3AED;font-size:14px;margin-bottom:4px">⏳ ממתין לייצור</div><div style="font-size:12px;color:#7C3AED">ההזמנה הועברה למחלקת הייצור</div></div>` :
    order.status==='in_production'&&user.role!=='production' ? `<div class="card" style="padding:16px 18px;margin-bottom:14px;background:#FFF7ED;border-color:#FED7AA"><div style="font-weight:700;color:#C2410C;font-size:14px;margin-bottom:4px">🏭 בתהליך ייצור</div><div style="font-size:12px;color:#EA580C">מנהל הייצור מטפל בהזמנה כרגע</div></div>` :
    order.status==='ready_for_install'&&user.role==='clerk' ? `<div class="card" style="padding:16px 18px;margin-bottom:14px;background:#EFF6FF;border-color:#93C5FD">
      <div style="font-weight:700;color:#1D4ED8;font-size:14px;margin-bottom:8px">✅ מוכן להתקנה — ממתין לאישורך</div>
      <button onclick="doUpdateStatus('${order.id}','completed')" style="background:#166534;color:white;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;width:100%">אשר וסגור הזמנה</button>
    </div>` : '';

  // PDF
  const isImg=pdfSrc&&/\.(jpg|jpeg)$/i.test(order.fileName||'');
  const pdfContent=pdfLoading?`<div style="text-align:center;color:#94A3B8"><div style="font-size:30px;animation:spin 1s linear infinite;display:inline-block">↻</div><div style="font-size:13px;margin-top:10px">טוען...</div></div>`:
    pdfSrc?(isImg?`<img src="${pdfSrc}" style="max-width:100%;max-height:100%;object-fit:contain" alt="הזמנה"/>`:
    `<iframe src="${pdfSrc}" style="width:100%;height:100%;border:none" title="PDF"></iframe>`):
    order.fileName?`<div class="pdf-placeholder">${icon('fileoff','color:#94A3B8')}<div style="font-size:14px;font-weight:600;color:#64748B;margin-top:10px">לא ניתן לטעון</div></div>`:
    `<div class="pdf-placeholder" style="color:#CBD5E1"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg><div style="font-size:14px;color:#94A3B8;margin-top:10px">לא צורף קובץ</div></div>`;

  // History
  const history=[...(order.history||[])].reverse().map((h,i,arr)=>`
    <div class="history-item" style="${i>=arr.length-1?'margin-bottom:0':''}">
      <div class="history-line">${dot(h.status)}${i<arr.length-1?'<div class="history-connector"></div>':''}</div>
      <div style="flex:1;padding-bottom:2px">
        <div style="font-size:13px;font-weight:700;color:${STATUS[h.status]?.fg||'#64748B'}">${STATUS[h.status]?.label||h.status}</div>
        ${h.note?`<div style="font-size:12px;color:#475569;margin-top:3px">${h.note}</div>`:''}
        <div style="font-size:11px;color:#94A3B8;margin-top:3px">${h.by} · ${fmtDateTime(h.at)}</div>
      </div>
    </div>`).join('');

  return `<div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <button class="back-btn" onclick="doGoBack()">${icon('arrow_r')} חזרה</button>
      <div style="flex:1"><h2 class="page-title">הזמנה ${order.num}</h2><div style="font-size:12px;color:#94A3B8;margin-top:2px">${order.customer} · ${fmtDateTime(order.createdAt)} · ${order.byName}</div></div>
      ${badge(order.status)}
    </div>
    <div class="detail-grid">
      <div class="card" style="overflow:hidden">
        <div class="pdf-toolbar">
          <span style="font-size:14px;font-weight:600;color:#1E293B;display:flex;align-items:center;gap:6px">${order.fileName?`${icon('pdf')} ${order.fileName}`:'<span style="color:#94A3B8">ללא קובץ מצורף</span>'}</span>
          <div style="display:flex;align-items:center;gap:10px">
            ${pdfSrc?`<a href="${pdfSrc}" target="_blank" style="font-size:13px;color:#2563EB;text-decoration:none;display:flex;align-items:center;gap:4px">${icon('download')} הורדה</a>`:''}
            ${user.role==='graphics'?`<label style="font-size:13px;color:#6B21A8;cursor:pointer;display:flex;align-items:center;gap:4px;background:#F5F3FF;border:1px solid #C4B5FD;border-radius:6px;padding:4px 10px;font-weight:600">🔄 החלף קובץ<input type="file" accept=".pdf,.jpg,.jpeg" style="display:none" onchange="doReplaceFile('${order.id}',this.files[0])"/></label>`:''}
          </div>
        </div>
        <div class="pdf-body">${pdfContent}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card" style="padding:18px 20px">
          <div class="section-title">פרטי הזמנה</div>
          ${[['לקוח',order.customer],['כמות',order.quantity?order.quantity+' יח׳':'—'],['קיימת גרפיקה', order.hasGraphics===true?'<span style="color:#166534;font-weight:700">✓ כן</span>': order.hasGraphics===false?'<span style="color:#991B1B;font-weight:700">✗ לא</span>':'—'],['תאריך ההזמנה',`<span style="color:${urgent?'#991B1B':'inherit'}">${fmtDate(order.due)}${urgent?' ⚠':''}</span>`],['תאריך אספקה', order.installdue?`<span style="color:${isPast(order.installdue)&&order.status!=='completed'?'#991B1B':'inherit'}">${fmtDate(order.installdue)}${isPast(order.installdue)&&order.status!=='completed'?' ⚠':''}</span>`:'—'],["נוצר ע\"י",order.byName],['תאריך יצירה',fmtDateTime(order.createdAt)]].map(([k,v])=>`<div class="detail-meta"><span style="color:#94A3B8;font-weight:500">${k}</span><span style="font-weight:600;color:#1E293B">${v}</span></div>`).join('')}
          ${order.details?`<div style="margin-top:10px;padding:10px 12px;background:#F0F9FF;color:#0C4A6E;border:1px solid #7DD3FC;border-radius:8px"><div style="font-weight:700;margin-bottom:6px">פירוט הזמנה:</div><div style="line-height:1.7;white-space:pre-wrap;font-size:13px">${order.details}</div></div>`:''}
          ${(()=>{ const prodNote = order.history&&[...order.history].reverse().find(h=>h.status==='pending_production'&&h.note); return prodNote&&(user.role==='production'||user.role==='clerk')?`<div style="margin-top:10px;padding:10px 12px;background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA;border-radius:8px"><div style="font-weight:700;margin-bottom:4px">📋 הוראות לייצור מעופר:</div>${prodNote.note}</div>`:''; })()}
          ${order.notes?`<div style="margin-top:10px;padding:10px 12px;background:#FFFBEB;color:#92400E;border:1px solid #FCD34D;border-radius:8px"><div style="font-weight:700;margin-bottom:4px">הערות:</div>${order.notes}</div>`:''}
        </div>
        ${statusActions}
        ${infoBox}
        <div class="card" style="padding:18px 20px">
          <div class="section-title">היסטוריה</div>
          ${history}
        </div>
      </div>
    </div>
  </div>`;
}

// ── Event handlers ─────────────────────────────────────────────────
function onLogin(){
  const u=document.getElementById('inp-u')?.value||'';
  const p=document.getElementById('inp-p')?.value||'';
  doLogin(u,p);
}

// ── Start ──────────────────────────────────────────────────────────
init();

// ══════════════════════════════════════════════════════════════════
// צ'אט פנימי
// ══════════════════════════════════════════════════════════════════
let chatState = {
  open: false,
  tab: 'group',       // 'group' | 'private'
  chatWith: null,     // {id, name, role}
  messages: [],
  users: [],
  unread: 0,
  lastSeen: localStorage.getItem('chat_lastseen') || '1970-01-01',
};

const ROLE_EMOJI = {clerk:'📋',graphics:'🎨',print:'🖨',production:'🏭'};
const ROLE_COLOR = {clerk:'#1E3A5F',graphics:'#6B21A8',print:'#0E7490',production:'#C2410C'};

async function chatInit(){
  if(!state.user) return;
  // טעינת משתמשים
  const {data} = await db.from('users').select('id,name,role,username').neq('id', state.user.id);
  chatState.users = data||[];
  // טעינת הודעות קבוצתיות
  await chatLoadMessages();
  // Realtime
  db.channel('chat-channel')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'}, payload=>{
      const m = payload.new;
      const isRelevant = !m.recipientid || m.recipientid===state.user.id || m.senderid===state.user.id;
      const isCurrentChat = chatState.open && (
        (chatState.tab==='group' && !m.recipientid) ||
        (chatState.tab==='private' && chatState.chatWith && (m.senderid===chatState.chatWith.id || m.recipientid===chatState.chatWith.id))
      );
      if(isRelevant){
        if(m.senderid !== state.user.id){
          if(!isCurrentChat){ chatState.unread++; updateBadge(); }
        }
        if(isCurrentChat){
          chatState.messages.push(mapMsg(m));
          renderChatMessages();
        }
      }
    })
    .subscribe();
  renderChatWidget();
}

function mapMsg(m){ return {id:m.id, senderId:m.senderid||m.senderId, senderName:m.sendername||m.senderName, recipientId:m.recipientid||m.recipientId||null, content:m.content, createdAt:m.createdat||m.createdAt}; }

async function chatLoadMessages(){
  let q = db.from('messages').select('*').order('createdat',{ascending:true});
  if(chatState.tab==='group'){
    q = q.is('recipientid', null);
  } else if(chatState.chatWith){
    q = q.or(`and(senderid.eq.${state.user.id},recipientid.eq.${chatState.chatWith.id}),and(senderid.eq.${chatState.chatWith.id},recipientid.eq.${state.user.id})`);
  }
  const {data} = await q.limit(100);
  chatState.messages = (data||[]).map(mapMsg);
}

async function chatSend(){
  const input = document.getElementById('chat-input');
  if(!input) return;
  const content = input.value.trim();
  if(!content) return;
  input.value='';
  const msg = {
    id:'m_'+Date.now(),
    senderid:state.user.id, sendername:state.user.name,
    recipientid: chatState.tab==='private' && chatState.chatWith ? chatState.chatWith.id : null,
    content, createdat:new Date().toISOString()
  };
  const {error} = await db.from('messages').insert(msg);
  if(!error){
    chatState.messages.push(mapMsg(msg));
    renderChatMessages();
  }
}

function chatOpen(){
  chatState.open=!chatState.open;
  if(chatState.open){ chatState.unread=0; updateBadge(); localStorage.setItem('chat_lastseen',new Date().toISOString()); }
  const win=document.getElementById('chat-window');
  if(win){ win.className=chatState.open?'open':''; }
  if(chatState.open) setTimeout(()=>{ const el=document.getElementById('chat-messages'); if(el) el.scrollTop=el.scrollHeight; },50);
}

function chatSetTab(tab){
  chatState.tab=tab; chatState.chatWith=null; chatState.messages=[];
  document.querySelectorAll('.chat-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.chat-tab')[tab==='group'?0:1]?.classList.add('active');
  document.getElementById('chat-users').className = tab==='private'?'visible':'';
  document.getElementById('chat-title-text').textContent = tab==='group'?'💬 קבוצתי':'👤 פרטי';
  document.getElementById('chat-back').style.display='none';
  if(tab==='group'){ chatLoadMessages().then(renderChatMessages); }
  else{ chatState.messages=[]; renderChatMessages(); }
}

function chatOpenPrivate(user){
  chatState.chatWith=user; chatState.messages=[];
  document.getElementById('chat-users').className='';
  document.getElementById('chat-title-text').textContent=`💬 ${user.name}`;
  document.getElementById('chat-back').style.display='inline';
  chatLoadMessages().then(renderChatMessages);
}

function chatBack(){
  chatState.chatWith=null; chatState.messages=[];
  document.getElementById('chat-users').className='visible';
  document.getElementById('chat-title-text').textContent='👤 פרטי';
  document.getElementById('chat-back').style.display='none';
  renderChatMessages();
}

function updateBadge(){
  const b=document.getElementById('chat-badge');
  if(!b) return;
  if(chatState.unread>0){ b.style.display='flex'; b.textContent=chatState.unread>9?'9+':chatState.unread; }
  else { b.style.display='none'; }
}

function fmtChatTime(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}); }

function renderChatMessages(){
  const el=document.getElementById('chat-messages');
  if(!el) return;
  const msgs = chatState.messages;
  if(!msgs.length){ el.innerHTML='<div style="text-align:center;color:#94A3B8;padding:20px;font-size:13px">אין הודעות עדיין</div>'; return; }
  el.innerHTML = msgs.map(m=>{
    const mine = m.senderId===state.user.id;
    return `<div class="msg-row ${mine?'mine':'theirs'}">
      <div class="msg-bubble">${m.content}</div>
      <div class="msg-meta">${mine?'':m.senderName+' · '}${fmtChatTime(m.createdAt)}</div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

function renderChatWidget(){
  const existing=document.getElementById('chat-bubble');
  if(existing) existing.remove();
  if(!state.user) return;
  const div=document.createElement('div');
  div.id='chat-bubble';
  div.innerHTML=`
    <div id="chat-window" class="${chatState.open?'open':''}">
      <div id="chat-header">
        <button id="chat-back" onclick="chatBack()" style="display:none;background:none;border:none;color:rgba(255,255,255,0.8);cursor:pointer;font-size:13px">← חזרה</button>
        <span id="chat-title-text">💬 קבוצתי</span>
        <button onclick="chatOpen()" style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:18px;line-height:1">✕</button>
      </div>
      <div id="chat-tabs">
        <button class="chat-tab active" onclick="chatSetTab('group')">קבוצתי 👥</button>
        <button class="chat-tab" onclick="chatSetTab('private')">פרטי 👤</button>
      </div>
      <div id="chat-users">
        ${chatState.users.map(u=>`
          <button class="chat-user-btn" onclick="chatOpenPrivate({id:'${u.id}',name:'${u.name}',role:'${u.role}'})">
            <div class="chat-user-avatar" style="background:${ROLE_COLOR[u.role]||'#1E3A5F'}20;color:${ROLE_COLOR[u.role]||'#1E3A5F'}">${ROLE_EMOJI[u.role]||'👤'}</div>
            <div>
              <div style="font-weight:600">${u.name}</div>
              <div style="font-size:11px;color:#94A3B8">${u.role==='clerk'?'פקידה':u.role==='graphics'?'גרפיקה':u.role==='print'?'דפוס':'ייצור'}</div>
            </div>
          </button>`).join('')}
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" placeholder="כתוב הודעה..." onkeydown="if(event.key==='Enter')chatSend()"/>
        <button id="chat-send" onclick="chatSend()">שלח</button>
      </div>
    </div>
    <button id="chat-btn" onclick="chatOpen()" title="צ'אט פנימי">
      💬
      <div id="chat-badge"></div>
    </button>`;
  document.body.appendChild(div);
  renderChatMessages();
  updateBadge();
  if(chatState.open) setTimeout(()=>{ const el=document.getElementById('chat-messages'); if(el) el.scrollTop=el.scrollHeight; },50);
}

// אתחול צ'אט אחרי כניסה
const _origSetState = setState;
setState = function(patch){
  const wasLoggedIn = !!state.user;
  _origSetState(patch);
  if(!wasLoggedIn && state.user){ chatInit(); }
  else if(state.user){ renderChatWidget(); }
};
</script>
